<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Launching Soon | Velocity Auto India</title>
    <meta name="description" content="Velocity Auto India is launching on 19th March 2026. Genuine OEM luxury car parts for Mercedes, BMW, Audi, Porsche, Bentley, Rolls Royce & more.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* RESET & ROOT */
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
          --navy:#003366;
          --gold:#FFD700;
          --white:#ffffff;
        }
        body{
          font-family:'Montserrat',sans-serif;
          background:#000;
          color:#fff;
          min-height:100vh;
          overflow-x:hidden;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        /* BACKGROUND LAYER */
        .bg-wrap{
          position:fixed;
          top:0;left:0;right:0;bottom:0;
          z-index:0;
          background: 
            linear-gradient(135deg, rgba(0,0,0,0.9) 0%, rgba(0,30,70,0.85) 100%),
            url('velocity-dealership.png') center/cover no-repeat;
        }

        /* MAIN CONTENT */
        .cs-main{
          position:relative;
          z-index:10;
          text-align:center;
          padding:40px;
          max-width: 800px;
        }

        .launch-label{
          display:inline-flex;
          align-items:center;
          background:rgba(255,215,0,.1);
          border:1px solid rgba(255,215,0,.3);
          color:var(--gold);
          padding:10px 25px;
          border-radius:30px;
          font-size:12px;
          font-weight:700;
          text-transform:uppercase;
          letter-spacing:3px;
          margin-bottom:30px;
        }

        .cs-headline{
          font-family:'Playfair Display',serif;
          font-size:clamp(35px, 7vw, 65px);
          font-weight:900;
          line-height:1.1;
          margin-bottom:25px;
        }

        .line2{
          display:block;
          color: var(--gold);
          margin-top: 10px;
        }

        /* COUNTDOWN GRID */
        .countdown{
          display:flex;
          gap:15px;
          justify-content:center;
          margin: 45px 0;
          flex-wrap: wrap;
        }
        .cd-box{
          display:flex;
          flex-direction:column;
          align-items:center;
        }
        .cd-num{
          font-family:'Playfair Display',serif;
          font-size:42px;
          font-weight:900;
          color:var(--white);
          background:rgba(255,255,255,.07);
          border:1px solid rgba(255,215,0,0.3);
          border-radius:15px;
          width:90px; height:95px;
          display:flex; align-items:center; justify-content:center;
          backdrop-filter: blur(5px);
        }
        .cd-unit{
          font-size:11px;
          text-transform:uppercase;
          letter-spacing:1.5px;
          color:var(--gold);
          margin-top:10px;
          font-weight: 600;
        }

        /* ACTIONS */
        .contact-buttons{display:flex; gap:20px; justify-content:center; flex-wrap:wrap;}
        .btn{
          padding:15px 30px;
          border-radius:50px;
          font-weight:700;
          text-decoration:none;
          display:flex;
          align-items:center;
          gap:12px;
          transition: transform 0.3s ease, box-shadow 0.3s ease;
          font-size: 14px;
        }
        .btn-whatsapp{ background-color:#25d366; color:white; }
        .btn-email{ border:1px solid white; color:white; }
        .btn:hover{
          transform: translateY(-3px);
          box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="bg-wrap"></div>

<main class="cs-main">
    <div class="launch-label">Official Launch Countdown</div>

    <h1 class="cs-headline">
        <span>Experience Luxury</span>
        <span class="line2">Redefined</span>
    </h1>

    <div class="countdown" id="timer-display">
        <div class="cd-box"><div class="cd-num" id="days">00</div><div class="cd-unit">Days</div></div>
        <div class="cd-box"><div class="cd-num" id="hours">00</div><div class="cd-unit">Hrs</div></div>
        <div class="cd-box"><div class="cd-num" id="minutes">00</div><div class="cd-unit">Mins</div></div>
        <div class="cd-box"><div class="cd-num" id="seconds">00</div><div class="cd-unit">Secs</div></div>
    </div>

    <div class="contact-buttons">
        <a href="https://wa.me/919611991902" class="btn btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> Inquiry via WhatsApp
        </a>
        <a href="mailto:kumarvelocityautoindia@gmail.com" class="btn btn-email">
            <i class="fas fa-envelope"></i> Professional Inquiry
        </a>
    </div>
</main>

<script>
    // Set Launch Date: March 19, 2026, 09:00 AM
    const launchDate = new Date("March 19, 2026 09:00:00").getTime();

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = launchDate - now;

        if (distance < 0) {
            document.getElementById("timer-display").innerHTML = "<h2 style='color:#FFD700; font-size:2rem;'>WE ARE NOW LIVE</h2>";
            return;
        }

        const d = Math.floor(distance / (1000 * 60 * 60 * 24));
        const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = d.toString().padStart(2, '0');
        document.getElementById("hours").innerHTML = h.toString().padStart(2, '0');
        document.getElementById("minutes").innerHTML = m.toString().padStart(2, '0');
        document.getElementById("seconds").innerHTML = s.toString().padStart(2, '0');
    }

    // Run every second
    setInterval(updateCountdown, 1000);
    // Run immediately on load
    updateCountdown();
</script>
</body>
</html>
