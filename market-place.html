<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | Velocity Auto India</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root { 
            --navy: #001a33;
            --gold: #c5a059;
            --accent: #d32f2f;
            --white: #ffffff;
            --bg-light: #f4f7f9;
            --border: #d1d9e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--white); color: #333; line-height: 1.6; }

        /* NAVIGATION BAR */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 22px; color: var(--navy); text-decoration: none; }
        .logo span { color: var(--gold); }
        .nav-link { text-decoration: none; color: var(--navy); font-weight: 700; font-size: 13px; letter-spacing: 1px; }
        .back-btn { color: var(--gold); text-decoration: none; font-weight: 700; font-size: 13px; }

        /* BRAND FILTERS */
        .brand-filters { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .filter-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--navy);
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 12px;
            text-transform: uppercase;
        }
        .filter-btn:hover { background: var(--gold); color: white; border-color: var(--gold); }

        /* SHOWROOM HERO */
        .hero { 
            background: linear-gradient(rgba(0, 26, 51, 0.8), rgba(0, 26, 51, 0.8)), url('velocity-dealership.png') center/cover no-repeat;
            padding: 100px 20px; text-align: center; color: white; 
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 10px; }
        .hero p { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; opacity: 0.8; }

        /* SEARCH SECTION */
        .search-area { background: var(--bg-light); padding: 40px 5%; border-bottom: 1px solid var(--border); }
        .search-wrap { max-width: 600px; margin: 0 auto; position: relative; }
        .search-wrap input { width: 100%; padding: 15px 50px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-wrap i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #aaa; }

        /* GRID LAYOUT */
        .parts-container { padding: 60px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; min-height: 300px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.4s ease; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-color: var(--gold); }
        .img-placeholder { height: 220px; background: #fdfdfd; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #ddd; border-bottom: 1px solid var(--bg-light); }
        .card-content { padding: 25px; }
        .brand { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; background: rgba(197, 160, 89, 0.1); padding: 2px 8px; border-radius: 4px; }
        .title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 800; color: var(--navy); margin: 12px 0 8px; }
        
        .btn-inquiry { 
            display: block; width: 100%; padding: 14px; background: var(--accent); color: white; text-align: center; 
            text-decoration: none; border-radius: 6px; margin-top: 20px; font-weight: 700; text-transform: uppercase; transition: 0.3s;
        }
        .btn-inquiry:hover { background: var(--navy); transform: scale(1.02); }

        /* VIN BANNER */
        .vin-banner { background: var(--navy); color: white; padding: 70px 20px; text-align: center; }
        .vin-form { max-width: 550px; margin: 30px auto 0; display: flex; gap: 10px; }
        .vin-form input { flex: 1; padding: 15px; border-radius: 6px; border: none; font-size: 16px; }
        .vin-form button { background: var(--gold); border: none; padding: 0 30px; border-radius: 6px; font-weight: 800; cursor: pointer; color: var(--navy); }

        footer { background: #000; color: #666; padding: 40px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> BACK</a>
        <a href="index.html" class="logo">VELOCITY <span>AUTO INDIA</span></a>
    </div>
    <a href="https://wa.me/919611991902" class="nav-link"><i class="fab fa-whatsapp"></i> CONTACT EXPERT</a>
</header>

<section class="hero">
    <h1>Luxury Inventory</h1>
    <p>Precision Sourcing for the Elite</p>
</section>

<div class="search-area">
    <div class="brand-filters">
        <button onclick="setSearch('Mercedes')" class="filter-btn">Mercedes</button>
        <button onclick="setSearch('BMW')" class="filter-btn">BMW</button>
        <button onclick="setSearch('Audi')" class="filter-btn">Audi</button>
        <button onclick="setSearch('Porsche')" class="filter-btn">Porsche</button>
        <button onclick="setSearch('')" class="filter-btn" style="background:#eee; color:#333;">Reset</button>
    </div>
    <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by car brand or part type..." onkeyup="search()">
    </div>
</div>

<main class="parts-container" id="partsList">
    </main>

<section class="vin-banner">
    <h2>Can't find a specific part?</h2>
    <p>Provide your 17-digit VIN for an exact compatibility match.</p>
    <div class="vin-form">
        <input type="text" id="vinBox" placeholder="Enter VIN Number">
        <button onclick="checkVin()">VERIFY</button>
    </div>
</section>

<footer>
    &copy; 2026 Velocity Auto India | Authenticity Guaranteed
</footer>

<script src="marketplace.js"></script>

</body>
</html>
