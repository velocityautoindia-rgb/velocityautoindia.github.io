<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace | Velocity Auto India</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <style>
        :root {
            --navy: #001a33;
            --gold: #FFD700;
            --white: #ffffff;
            --bg-light: #f9f9f9;
            --border: #eeeeee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--white); color: #333; line-height: 1.6; }

        /* NAVIGATION BAR */
        header { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 15px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Playfair Display', serif; font-weight: 800; font-size: 22px; color: var(--navy); text-decoration: none; }
        .logo span { color: var(--gold); }
        .nav-link { text-decoration: none; color: var(--navy); font-weight: 700; font-size: 13px; letter-spacing: 1px; }

        /* SHOWROOM HERO */
        .hero { 
            background: linear-gradient(rgba(0, 26, 51, 0.8), rgba(0, 26, 51, 0.8)), url('velocity-dealership.png') center/cover no-repeat;
            padding: 100px 20px; text-align: center; color: white; 
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 48px; margin-bottom: 10px; }
        .hero p { font-weight: 300; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; opacity: 0.8; }

        /* SEARCH SECTION */
        .search-area { background: var(--bg-light); padding: 30px 5%; border-bottom: 1px solid var(--border); }
        .search-wrap { max-width: 600px; margin: 0 auto; position: relative; }
        .search-wrap input { width: 100%; padding: 15px 50px; border-radius: 30px; border: 1px solid var(--border); outline: none; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-wrap i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #aaa; }

        /* GRID LAYOUT */
        .parts-container { padding: 60px 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; min-height: 300px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: 0.4s ease; }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); border-color: var(--gold); }
        .img-placeholder { height: 220px; background: #f4f4f4; display: flex; align-items: center; justify-content: center; font-size: 60px; color: #ddd; }
        .card-content { padding: 25px; }
        .brand { font-size: 11px; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--navy); margin: 8px 0; }
        
        .btn-inquiry { 
            display: block; width: 100%; padding: 14px; background: var(--navy); color: white; text-align: center; 
            text-decoration: none; border-radius: 6px; margin-top: 20px; font-weight: 600; transition: 0.3s;
        }
        .btn-inquiry:hover { background: var(--gold); color: var(--navy); }

        /* VIN CHECK */
        .vin-banner { background: var(--navy); color: white; padding: 70px 20px; text-align: center; }
        .vin-form { max-width: 550px; margin: 30px auto 0; display: flex; gap: 10px; }
        .vin-form input { flex: 1; padding: 15px; border-radius: 6px; border: none; font-size: 16px; color: #333; }
        .vin-form button { background: var(--gold); border: none; padding: 0 30px; border-radius: 6px; font-weight: 800; cursor: pointer; color: var(--navy); transition: 0.3s; }
        .vin-form button:hover { opacity: 0.9; }

        footer { background: #000; color: #666; padding: 40px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">VELOCITY <span>AUTO INDIA</span></a>
    <a href="https://wa.me/919611991902" class="nav-link"><i class="fab fa-whatsapp"></i> CONTACT EXPERT</a>
</header>

<section class="hero">
    <h1>Luxury Inventory</h1>
    <p>Precision Sourcing for the Elite</p>
</section>

<div class="search-area">
    <div class="search-wrap">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by car brand or part type (e.g. BMW Brakes)..." onkeyup="search()">
    </div>
</div>

<main class="parts-container" id="partsList">
    </main>

<section class="vin-banner">
    <h2>Can't find a specific part?</h2>
    <p>Provide your 17-digit VIN for an exact compatibility match.</p>
    <div class="vin-form">
        <input type="text" id="vinBox" placeholder="Enter VIN Number">
        <button onclick="checkVin()">VERIFY</button>
    </div>
</section>

<footer>
    &copy; 2026 Velocity Auto India | Authenticity Guaranteed
</footer>

<script>
    // 1. THE INVENTORY DATA
    const inventory = [
        { brand: "Mercedes M276, BMW N55/B58, Audi EA888, Porsche MA1", part: "Engine Assembly", desc: "Complete engine units and rebuilds" },
        { brand: "Porsche 9A1, BMW S55/S58, Audi RS TFSI", part: "Pistons & Rings", desc: "High-performance pistons and rings" },
        { brand: "Mercedes Bosch, BMW Siemens, Audi Continental", part: "Fuel Injectors", desc: "High-precision fuel injection systems" },
        { brand: "Porsche Sport, Mercedes AMG, BMW M, Akrapovic", part: "Performance Exhaust", desc: "High-flow manifolds and systems" },
        { brand: "Mercedes AIRMATIC, Range Rover EAS, Audi Adaptive", part: "Air Suspension", desc: "Adaptive air suspension systems" },
        { brand: "Porsche PCCB, Mercedes AMG Carbon, BMW M Carbon", part: "Carbon-Ceramic Brakes", desc: "High-performance ceramic discs" },
        { brand: "Mercedes 7G-Tronic, BMW ZF 8HP, Audi Tiptronic", part: "Automatic Transmission", desc: "Complete transmission units" },
        { brand: "Range Rover, Audi Quattro, BMW xDrive", part: "4WD Transfer Case", desc: "All-wheel drive transfer units" },
        { brand: "Mercedes, BMW, Audi, Volvo", part: "Adaptive Cruise Control", desc: "ACC radar and control modules" },
        { brand: "Michelin Pilot Sport 4S, Pirelli P-Zero, Continental", part: "Performance Tires", desc: "High-performance luxury tires" }
    ];

    // 2. INITIALIZE FUZZY SEARCH
    const fuse = new Fuse(inventory, {
        keys: ['brand', 'part', 'desc'],
        threshold: 0.3
    });

    // 3. SEARCH FUNCTION
    function search() {
        const term = document.getElementById('searchInput').value;
        const grid = document.getElementById('partsList');
        
        if (term.length < 2) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; opacity:0.5; padding:50px;">Start typing to search 175+ luxury parts...</p>';
            return;
        }

        const results = fuse.search(term);
        grid.innerHTML = ''; 

        if (results.length === 0) {
            grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; padding:50px;">No match found. Contact our expert for custom sourcing.</p>';
            return;
        }

        results.forEach(r => {
            const item = r.item;
            grid.innerHTML += `
                <div class="card">
                    <div class="img-placeholder"><i class="fas fa-car-side"></i></div>
                    <div class="card-content">
                        <span class="brand">${item.brand}</span>
                        <h3 class="title">${item.part}</h3>
                        <p style="font-size: 13px; color: #666; margin-bottom: 15px;">${item.desc}</p>
                        <a href="https://wa.me/919611991902?text=I am interested in: ${item.part} for ${item.brand}" class="btn-inquiry">I NEED THIS PART</a>
                    </div>
                </div>
            `;
        });
    }

    // 4. VIN CHECK FUNCTION
    function checkVin() {
        const v = document.getElementById('vinBox').value;
        if(v.length < 1) return alert("Please enter a VIN");
        window.location.href = `https://wa.me/919611991902?text=VIN Compatibility Check: ${v}`;
    }

    // Initialize display on load
    search();
</script>

</body>
</html>
